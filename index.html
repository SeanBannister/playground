<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISF Shader Playground - Embedded Demo</title>
</head>

<body>

    <!-- We no longer need all the boilerplate HTML here, the ISF playground script injects it! -->

    <script type="module">
        import { isfPlayground } from './script.js';

        // Fetch our shader and instantiate the playground on the body
        fetch('shader.fs')
            .then(res => {
                if (!res.ok) throw new Error("Failed to load shader.fs");
                return res.text();
            })
            .then(shaderCode => {
                isfPlayground(shaderCode);
            })
            .catch(err => console.error("Error loading shader:", err));
    </script>
</body>

</html>
